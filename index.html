
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green-light: #c8e6c9; --green-mid: #a5d6a7; --green-btn: #81c784;
    --green-dark: #388e3c; --green-shine: #e8f5e9; --white: #ffffff;
    --text-main: #2e4a2e; --text-muted: #6a8f6a; --shadow: rgba(100,160,100,0.15);
  }
  body { font-family: 'Nunito', sans-serif; background: #f5fbf5; }
  #app { min-height: 100vh; background: linear-gradient(160deg, #e8f5e9 0%, #f1f8e9 40%, #e0f2f1 100%); overflow: hidden; }
  .header { text-align: center; padding: 2rem 1rem 1rem; }
  .header h1 { font-size: 2rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
  .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.25rem; }
  .progress-bar-wrap { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin: 0.75rem auto 0; max-width: 340px; }
  .progress-bar-track { flex: 1; height: 8px; background: var(--green-light); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green-btn), var(--green-dark)); border-radius: 99px; transition: width 0.5s ease; }
  .progress-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .road-scene { position: relative; width: 100%; height: 140px; overflow: hidden; margin-bottom: -20px; }
  .road-svg { width: 100%; height: 100%; }
  .slider-container { position: relative; width: 100%; overflow: hidden; padding: 0 0 2rem; touch-action: pan-y; }
  .slider-track { display: flex; gap: 1.25rem; padding: 1.5rem 2rem 1rem; will-change: transform; cursor: grab; transition: none; }
  .slider-track.snapping { transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
  .slider-track:active { cursor: grabbing; }
  .stop-card { flex: 0 0 300px; background: var(--white); border-radius: 20px; border: 1.5px solid var(--green-mid); padding: 1.25rem 1.25rem 1rem; position: relative; box-shadow: 0 4px 20px var(--shadow); user-select: none; }
  .stop-card.done { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); border-color: var(--green-btn); }
  .stop-card.active-card { box-shadow: 0 8px 32px rgba(100,160,100,0.25); transform: translateY(-4px); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.75rem; gap: 0.5rem; }
  .month-num { font-size: 2.5rem; font-weight: 800; color: var(--green-btn); line-height: 1; flex-shrink: 0; }
  .stop-card.done .month-num { color: var(--green-dark); }
  .month-info { flex: 1; }
  .month-name { font-size: 1.1rem; font-weight: 800; color: var(--text-main); line-height: 1.2; }
  .month-focus { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-weight: 600; }
  .check-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--green-btn); background: var(--green-shine); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; position: relative; overflow: hidden; }
  .check-btn::before { content: ''; position: absolute; top: 2px; left: 4px; width: 60%; height: 30%; background: rgba(255,255,255,0.5); border-radius: 99px; transform: rotate(-20deg); }
  .check-btn:hover { background: var(--green-btn); border-color: var(--green-dark); transform: scale(1.1); }
  .check-btn.checked { background: var(--green-dark); border-color: var(--green-dark); }
  .check-icon { width: 16px; height: 16px; color: var(--white); }
  .divider { height: 1px; background: var(--green-light); margin: 0.5rem 0 0.75rem; }
  .tasks-list { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
  .task-item { display: flex; align-items: flex-start; gap: 0.5rem; font-size: 0.8rem; color: var(--text-main); line-height: 1.4; }
  .task-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-btn); margin-top: 5px; flex-shrink: 0; }
  .stop-card.done .task-dot { background: var(--green-dark); }
  .result-box { margin-top: 0.85rem; background: var(--green-shine); border: 1px solid var(--green-light); border-radius: 10px; padding: 0.6rem 0.75rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; line-height: 1.4; }
  .stop-number { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--green-btn); color: var(--white); font-size: 0.7rem; font-weight: 800; padding: 2px 10px; border-radius: 99px; box-shadow: 0 2px 8px var(--shadow); white-space: nowrap; }
  .stop-card.done .stop-number { background: var(--green-dark); }
  .nav-area { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 0.5rem 1rem 1.5rem; }
  .nav-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--green-btn); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; position: relative; overflow: hidden; box-shadow: 0 2px 10px var(--shadow); }
  .nav-btn::before { content: ''; position: absolute; top: 3px; left: 6px; width: 55%; height: 30%; background: rgba(255,255,255,0.6); border-radius: 99px; transform: rotate(-15deg); }
  .nav-btn:hover { background: var(--green-shine); transform: scale(1.08); }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .nav-btn svg { color: var(--green-dark); }
  .dots { display: flex; gap: 6px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-light); transition: all 0.3s; cursor: pointer; }
  .dot.active { background: var(--green-dark); width: 20px; border-radius: 99px; }
  .dot.done-dot { background: var(--green-btn); }
</style>

<div id="app">
  <div class="header">

    <p>Маркетплейсы и опт</p>

  <div class="road-scene">

        <ellipse cx="60" cy="55" rx="22" ry="28" fill="#81c784"/><rect x="55" y="75" width="10" height="20" fill="#795548"/>
        <ellipse cx="130" cy="48" rx="18" ry="24" fill="#66bb6a"/><rect x="124" y="66" width="9" height="18" fill="#6d4c41"/>
        <ellipse cx="200" cy="58" rx="20" ry="26" fill="#a5d6a7"/><rect x="194" y="78" width="10" height="18" fill="#795548"/>
        <ellipse cx="600" cy="52" rx="21" ry="27" fill="#81c784"/><rect x="594" y="73" width="10" height="19" fill="#795548"/>
        <ellipse cx="670" cy="46" rx="17" ry="23" fill="#66bb6a"/><rect x="664" y="63" width="9" height="18" fill="#6d4c41"/>
        <ellipse cx="740" cy="56" rx="20" ry="25" fill="#a5d6a7"/><rect x="734" y="76" width="9" height="18" fill="#795548"/>
      </g>
      <rect x="0" y="88" width="800" height="52" fill="url(#roadG)"/>
      <g stroke="rgba(255,255,255,0.6)" stroke-width="3" stroke-dasharray="40,30"><line x1="0" y1="114" x2="800" y2="114"/></g>

  <div class="nav-area">

      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="btn-next" onclick="navigate(1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<script>
const months = [
  { num:"03", name:"Март", focus:"Подготовительный этап", tasks:["Подготовка новой фотозоны для съёмки","Модернизация техники: Canon EOS R8 и штатив","Обучение по настройке техники, свету и обработке фото","Съёмка стеклянной посуды с рабочей обработкой","Первичный сбор обратной связи от оптовых клиентов"], result:"Подготовлена техническая и организационная база для визуального обновления." },
  {
    num:"04", name:"Апрель", focus:"Подготовка сайта и регламентов",
    tasks:[
      "Составление регламента для съёмки товаров на сайт",
      "Подготовка открыток для вложения в заказы",
      "Обучение менеджеров по памятке аргументов для СТМ",
      "Старт разработки нового сайта: цели, КП, предварительный бюджет"
    ],
    result:"Сформированы регламенты и запущена подготовка нового сайта."
  },
  { num:"05", name:"Май", focus:"Запуск ключевых оптовых инструментов и сайта", tasks:["Запуск персональных предложений для оптовых клиентов","Ранний доступ к новинкам для ключевых партнёров","Внедрение системы сертификатов и статусов","Запуск программы персональных подарков","Продолжение работ по новому сайту"], result:"Усилена лояльность действующих клиентов и продолжена разработка сайта." },
  {
    num:"06", name:"Июнь", focus:"Масштабирование визуального обновления и анализ опта",
    tasks:[
      "Запуск работ по обновлению упаковки для маркетплейсов",
      "Согласование партнёрских интеграций со смежными брендами",
      "Запуск обновления фото и упаковки в карточках",
      "Анализ первых результатов по персональным предложениям",
      "Расширение списка ключевых партнёров под систему статусов",
      "Подготовка к запуску кросс-маркетинга"
    ],
    result:"Начато масштабное обновление карточек и получены первые результаты по опту."
  },
  { num:"07", name:"Июль", focus:"Кросс-маркетинг и digital-подготовка", tasks:["Запуск первой волны кросс-маркетинга с бытовой химией","Закрепление ротации партнёров 1 раз в квартал","Сбор статистики по CTR, конверсии и продажам","Старт поиска специалиста по соцсетям","Продолжение разработки сайта"], result:"Запущена квартальная модель кросс-маркетинга." },
  { num:"08", name:"Август", focus:"Запуск собственных соцсетей", tasks:["Запуск VK-канала","Публикация контента по брендам и новинкам","Развитие визуального присутствия брендов","Продолжение разработки сайта"], result:"Сформирован собственный digital-канал." },
  { num:"09", name:"Сентябрь", focus:"Внешние интеграции", tasks:["Запуск коллабораций с блогерами","Интеграции с соцсетями и внешними площадками","Запуск рекламных размещений","Продолжение разработки сайта"], result:"Расширен охват аудитории и увеличен внешний трафик." },
  { num:"10", name:"Октябрь", focus:"Аналитика и вторая волна кросс-маркетинга", tasks:["Сбор статистики по первой волне кросс-маркетинга и блогерам","Смена партнёра и запуск второй волны размещений","Повторный сбор обратной связи","Корректировка ассортимента и условий","Продолжение разработки сайта"], result:"Скорректирована стратегия на основе статистики." },
  { num:"11", name:"Ноябрь", focus:"Высокий сезон", tasks:["Усиление карточек под сезонный спрос","Акцент на подарочные наборы и комплектные решения","Персональные предложения ключевым клиентам","Запуск сезонных маркетинговых механик","Продолжение разработки сайта"], result:"Усилены продажи в период высокого спроса." },
  { num:"12", name:"Декабрь", focus:"Итоги года и стратегия 2027", tasks:["Анализ выполнения KPI","Оценка роста выручки","Аналитика по блогерам, соцсетям и кросс-маркетингу","Планирование работ по сайту на 2027 год","Формирование стратегии на 2027 год"], result:"Подготовлен итоговый отчёт и стратегия развития на следующий год." }
];

let done = [true, false, false, false, false, false, false, false, false, false];
let current = 0;
const CARD_W = 300, CARD_GAP = 20, SIDE_PAD = 32;
let currentOffset = 0;
let dragActive = false, dragStartX = 0, dragStartOffset = 0, didDrag = false;

function getTrack() { return document.getElementById('slider-track'); }
function getContainer() { return document.getElementById('slider-container'); }

function cardOffset(idx) {
  const cW = getContainer().offsetWidth;
  const max = Math.max(0, months.length * (CARD_W + CARD_GAP) - cW + SIDE_PAD);
  return Math.max(0, Math.min(idx * (CARD_W + CARD_GAP) - cW / 2 + CARD_W / 2, max));
}

function applyOffset(offset, animate) {
  const track = getTrack();
  if (animate) { track.classList.add('snapping'); setTimeout(() => track.classList.remove('snapping'), 380); }
  else track.classList.remove('snapping');
  track.style.transform = `translateX(-${offset}px)`;
  currentOffset = offset;
}

function snapToCurrent(animate) {
  applyOffset(cardOffset(current), animate);
  updateUI();
}

function updateUI() {
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === months.length - 1;
  Array.from(getTrack().children).forEach((c, i) => c.classList.toggle('active-card', i === current));
  updateDots();
  updateProgress();
}

function updateDots() {
  const el = document.getElementById('dots');
  el.innerHTML = '';
  months.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '') + (done[i] ? ' done-dot' : '');
    d.onclick = () => { current = i; snapToCurrent(true); };
    el.appendChild(d);
  });
}

function updateProgress() {
  const count = done.filter(Boolean).length;
  document.getElementById('prog-fill').style.width = Math.round(count / months.length * 100) + '%';
  document.getElementById('prog-label').textContent = count + ' / ' + months.length + ' месяцев';
}

function navigate(dir) {
  current = Math.max(0, Math.min(months.length - 1, current + dir));
  snapToCurrent(true);
}

function toggleDone(i) {
  done[i] = !done[i];
  renderCards();
  snapToCurrent(false);
}

function renderCards() {
  const track = getTrack();
  track.innerHTML = '';
  months.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'stop-card' + (done[i] ? ' done' : '') + (i === current ? ' active-card' : '');
    card.innerHTML = `
      <div class="stop-number">Остановка ${i + 1}</div>
      <div class="card-header">
        <div class="month-num">${m.num}</div>
        <div class="month-info">
          <div class="month-name">${m.name} 2026</div>
          <div class="month-focus">${m.focus}</div>
        </div>
        <button class="check-btn ${done[i] ? 'checked' : ''}" title="Отметить как выполненный">
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            ${done[i] ? '<polyline points="20 6 9 17 4 12"/>' : '<polyline points="20 6 9 17 4 12" opacity="0.3"/>'}
          </svg>
        </button>
      </div>
      <div class="divider"></div>
      <ul class="tasks-list">
        ${m.tasks.map(t => `<li class="task-item"><span class="task-dot"></span><span>${t}</span></li>`).join('')}
      </ul>
      <div class="result-box">📌 ${m.result}</div>
    `;
    card.querySelector('.check-btn').addEventListener('click', e => { e.stopPropagation(); toggleDone(i); });
    card.addEventListener('click', () => { if (!didDrag) { current = i; snapToCurrent(true); } });
    track.appendChild(card);
  });
}

const container = document.getElementById('slider-container');
container.addEventListener('mousedown', e => {
  if (e.target.closest('.check-btn')) return;
  dragActive = true; didDrag = false;
  dragStartX = e.clientX; dragStartOffset = currentOffset;
  getTrack().classList.remove('snapping'); e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!dragActive) return;
  const delta = dragStartX - e.clientX;
  if (Math.abs(delta) > 4) didDrag = true;
  const max = Math.max(0, months.length * (CARD_W + CARD_GAP) - getContainer().offsetWidth + SIDE_PAD);
  applyOffset(Math.max(0, Math.min(dragStartOffset + delta, max)), false);
});
document.addEventListener('mouseup', () => {
  if (!dragActive) return;
  dragActive = false;
  if (!didDrag) return;
  const cW = getContainer().offsetWidth;
  const viewCenter = currentOffset + cW / 2;
  const ct = CARD_W + CARD_GAP;
  let best = 0, bestDist = Infinity;
  months.forEach((_, i) => {
    const dist = Math.abs(SIDE_PAD + i * ct + CARD_W / 2 - viewCenter);
    if (dist < bestDist) { bestDist = dist; best = i; }
  });
  current = best; snapToCurrent(true);
  setTimeout(() => { didDrag = false; }, 50);
});
container.addEventListener('touchstart', e => {
  if (e.target.closest('.check-btn')) return;
  dragStartX = e.touches[0].clientX; dragStartOffset = currentOffset; didDrag = false;
  getTrack().classList.remove('snapping');
}, { passive: true });
container.addEventListener('touchmove', e => {
  const delta = dragStartX - e.touches[0].clientX;
  if (Math.abs(delta) > 4) didDrag = true;
  const max = Math.max(0, months.length * (CARD_W + CARD_GAP) - getContainer().offsetWidth + SIDE_PAD);
  applyOffset(Math.max(0, Math.min(dragStartOffset + delta, max)), false);
}, { passive: true });
container.addEventListener('touchend', () => {
  if (!didDrag) return;
  const cW = getContainer().offsetWidth;
  const viewCenter = currentOffset + cW / 2;
  const ct = CARD_W + CARD_GAP;
  let best = 0, bestDist = Infinity;
  months.forEach((_, i) => {
    const dist = Math.abs(SIDE_PAD + i * ct + CARD_W / 2 - viewCenter);
    if (dist < bestDist) { bestDist = dist; best = i; }
  });
  current = best; snapToCurrent(true);
  setTimeout(() => { didDrag = false; }, 50);
}, { passive: true });

renderCards();
snapToCurrent(false);
</script>
